<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerEra - Cyber Diet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;500;700;800&family=VT323&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        theme: {
                            bg: 'var(--bg-color)',
                            card: 'var(--card-bg)',
                            text: 'var(--text-main)',
                            dim: 'var(--text-dim)',
                            accent: 'var(--accent-color)',
                            border: 'var(--border-color)'
                        }
                    },
                    fontFamily: {
                        tajawal: ['Tajawal', 'sans-serif'],
                        orbitron: ['Orbitron', 'sans-serif'],
                        vt323: ['VT323', 'monospace'],
                        lalezar: ['Lalezar', 'system-ui'],
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root, [data-theme="default"] {
            --bg-color: #09090b;
            --card-bg: rgba(20, 20, 25, 0.85);
            --text-main: #f4f4f5;
            --text-dim: #a1a1aa;
            --accent-color: #d946ef; 
            --border-color: #d946ef;
            --shadow-color: rgba(217, 70, 239, 0.5);
        }

        [data-theme="terminal"] {
            --bg-color: #000000;
            --card-bg: rgba(0, 20, 0, 0.85);
            --text-main: #22c55e;
            --text-dim: #166534;
            --accent-color: #4ade80; 
            --border-color: #22c55e;
            --shadow-color: rgba(34, 197, 94, 0.5);
        }

        [data-theme="synthwave"] {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --text-main: #2dd4bf;
            --text-dim: #0f766e;
            --accent-color: #f472b6; 
            --border-color: #f472b6;
            --shadow-color: rgba(244, 114, 182, 0.5);
        }

        [data-theme="icenet"] {
            --bg-color: #082f49;
            --card-bg: rgba(12, 74, 110, 0.85);
            --text-main: #e0f2fe;
            --text-dim: #7dd3fc;
            --accent-color: #38bdf8; 
            --border-color: #0ea5e9;
            --shadow-color: rgba(56, 189, 248, 0.5);
        }

        [data-theme="blackops"] {
            --bg-color: #0a0a0a;
            --card-bg: rgba(23, 23, 23, 0.85);
            --text-main: #ffffff;
            --text-dim: #737373;
            --accent-color: #f97316; 
            --border-color: #ea580c;
            --shadow-color: rgba(249, 115, 22, 0.5);
        }

        [data-theme="nokia"] {
            --bg-color: #43523d;
            --card-bg: #c7f0d8;
            --text-main: #2b3626;
            --text-dim: #5c7a53;
            --accent-color: #1a2417; 
            --border-color: #2b3626;
            --shadow-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

        /* Custom Scrollbar for Containers */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 4px; }

        /* CRT Effect */
        .crt::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            opacity: 0.5;
        }
        [data-theme="nokia"] .crt::before { display: none; } 

        /* Glow Effects */
        .glow-text { text-shadow: 0 0 5px var(--shadow-color), 0 0 10px var(--shadow-color); }
        .box-glow { box-shadow: 0 0 10px var(--shadow-color), inset 0 0 5px var(--shadow-color); }
        [data-theme="nokia"] .glow-text { text-shadow: none; }
        [data-theme="nokia"] .box-glow { box-shadow: none; }

        /* Flip Animation Classes */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-transition { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        /* Custom Table Borders */
        .retro-table th, .retro-table td { border-bottom: 1px solid var(--border-color); }
        .retro-table tr:last-child td { border-bottom: none; }
        
        /* Checkbox Custom */
        input[type="checkbox"] {
            appearance: none;
            width: 24px; height: 24px;
            border: 2px solid var(--accent-color);
            border-radius: 2px;
            background: transparent;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background: var(--accent-color); }
        input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: var(--bg-color);
            font-size: 16px;
            font-weight: bold;
            top: 0px; left: 4px;
        }
    </style>
</head>
<body class="crt font-tajawal antialiased min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Data Structure ---
        const MEAL_DATA = [
            {
                id: "week1",
                title: "الأسبوع الأول: التأسيس الكلاسيكي",
                meals: [
                    { type: "فطور", name: "بيض وتوست", desc: "3 بيضات مقلية بمسحة زبدة + شريحتين توست بر", macros: { cal: 390, p: 24, c: 24, f: 21 } },
                    { type: "غداء", name: "وعاء الدجاج", desc: "200 جم صدر دجاج + 200 جم رز + 100 جم خضار", macros: { cal: 630, p: 69, c: 64, f: 5 } },
                    { type: "سناك", name: "طاقة الموز", desc: "حبة موز + ملعقة زبدة فول سوداني + كوب حليب", macros: { cal: 350, p: 12, c: 42, f: 16 } },
                    { type: "عشاء", name: "قريش الزعتر", desc: "250 جم جبنة قريش + ملعقة زيت زيتون + رشة زعتر", macros: { cal: 330, p: 28, c: 10, f: 19 } }
                ],
                groceries: [
                    "1.2 كيلو صدور دجاج مجمدة", "طبق بيض كبير (30 حبة)", "1 كيلو جبنة قريش", 
                    "موز (6 حبات)", "حليب كامل الدسم (لتر)", "كيس توست بر", "كيس خضار مجمدة"
                ]
            },
            {
                id: "week2",
                title: "الأسبوع الثاني: طاقة الأوزان",
                meals: [
                    { type: "فطور", name: "شوفان متكامل", desc: "60 جم شوفان + حليب + ملعقة زبدة فول سوداني + تفاح", macros: { cal: 520, p: 19, c: 78, f: 15 } },
                    { type: "غداء", name: "مكرونة اللحم", desc: "150 جم لحم بقري مفروم + 150 جم مكرونة + صلصة", macros: { cal: 580, p: 47, c: 54, f: 16 } },
                    { type: "سناك", name: "تونة وتوست", desc: "علبة تونة بالماء + شريحتين توست بر + شريحة جبن", macros: { cal: 320, p: 36, c: 29, f: 7 } },
                    { type: "عشاء", name: "سلطة البيض", desc: "4 بيضات مسلوقة + صحن سلطة كبير + زيت زيتون", macros: { cal: 280, p: 24, c: 5, f: 20 } }
                ],
                groceries: [
                    "1 كيلو لحم بقري مفروم", "علبة شوفان كامل الحبة", "حليب قليل الدسم (لتر)", 
                    "تفاح (6 حبات)", "تونة بالماء (6 علب)", "جبن شرائح لايت", "كيس مكرونة"
                ]
            },
            {
                id: "week3",
                title: "الأسبوع الثالث: الشبع المكسيكي",
                meals: [
                    { type: "فطور", name: "فول بالزيت", desc: "150 جم فول مدمس + ملعقة زيت زيتون + توست", macros: { cal: 450, p: 14, c: 44, f: 23 } },
                    { type: "غداء", name: "فاهيتا وبطاطس", desc: "200 جم دجاج + خضار فاهيتا + 300 جم بطاطس", macros: { cal: 655, p: 68, c: 73, f: 4 } },
                    { type: "سناك", name: "زبادي وموز", desc: "150 جم زبادي يوناني سادة + حبة موز", macros: { cal: 205, p: 15, c: 33, f: 0 } },
                    { type: "عشاء", name: "بيض وخبز", desc: "4 بيضات مخفوقة + مسحة زبدة + نصف رغيف بر", macros: { cal: 400, p: 28, c: 25, f: 20 } }
                ],
                groceries: [
                    "1.2 كيلو صدور دجاج", "فول مدمس (4 علب)", "بطاطس (كيس)", 
                    "فلفل رومي ملون وبصل", "زبادي يوناني (6 علب)", "خبز بر / أسمر"
                ]
            },
            {
                id: "week4",
                title: "الأسبوع الرابع: المرونة والتصفية",
                meals: [
                    { type: "فطور", name: "بانكيك الشوفان", desc: "50 جم شوفان مطحون + بيضتين + رشة قرفة", macros: { cal: 330, p: 19, c: 33, f: 13 } },
                    { type: "غداء", name: "بروتين ورز", desc: "150 جم دجاج/لحم + 250 جم رز + خضار ورقية", macros: { cal: 645, p: 51, c: 72, f: 10 } },
                    { type: "سناك", name: "ساندوتش تيركي", desc: "4 شرائح ديك رومي + شريحة جبن + توست + تفاح", macros: { cal: 415, p: 30, c: 51, f: 11 } },
                    { type: "عشاء", name: "قريش ومكسرات", desc: "250 جم جبنة قريش + ملعقة عسل + مكسرات", macros: { cal: 330, p: 31, c: 29, f: 11 } }
                ],
                groceries: [
                    "شرائح ديك رومي مدخن (تيركي)", "نصف كيلو جبنة قريش", "عسل نحل (علبة)", 
                    "مكسرات (لوز أو فول سوداني)", "تفاح وخضار ورقية", "*استخدام بواقي اللحوم"
                ]
            }
        ];

        const THEMES = ['default', 'terminal', 'synthwave', 'icenet', 'blackops', 'nokia'];

        // --- Components ---

        const SniperCorners = () => (
            <>
                <div className="absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-theme-accent z-20"></div>
                <div className="absolute top-0 left-0 w-3 h-3 border-t-2 border-l-2 border-theme-accent z-20"></div>
                <div className="absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-theme-accent z-20"></div>
                <div className="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-theme-accent z-20"></div>
            </>
        );

        const ThemeMenu = ({ currentTheme, setTheme }) => {
            const [isOpen, setIsOpen] = useState(false);

            return (
                <div className="fixed top-4 left-4 z-50">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-12 h-12 rounded-none border border-theme-accent bg-theme-bg flex items-center justify-center text-theme-accent box-glow hover:bg-theme-accent hover:text-theme-bg transition-colors active:scale-95"
                    >
                        <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                            <path strokeLinecap="square" strokeLinejoin="miter" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </button>
                    
                    {isOpen && (
                        <div className="absolute top-14 left-0 w-40 bg-theme-card border border-theme-accent backdrop-blur-md p-2 box-glow">
                            <SniperCorners />
                            {THEMES.map(theme => (
                                <button
                                    key={theme}
                                    onClick={() => { setTheme(theme); setIsOpen(false); }}
                                    className={`w-full text-left px-3 py-2 text-sm font-orbitron uppercase mb-1 transition-colors ${currentTheme === theme ? 'bg-theme-accent text-theme-bg' : 'text-theme-dim hover:text-theme-accent'}`}
                                >
                                    > {theme}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const WeekCard = ({ weekData, checkedItems, toggleCheck }) => {
            const [isFlipped, setIsFlipped] = useState(false);

            return (
                // تم إرجاع ارتفاع البطاقة ليكون ملموماً (500px)
                <div className="relative w-full perspective-1000 mb-12 h-[500px]">
                    <div className={`w-full h-full transform-style-3d flip-transition ${isFlipped ? 'rotate-y-180' : ''}`}>
                        
                        {/* Front Side: Meal Plan Table */}
                        <div className="absolute w-full h-full backface-hidden bg-theme-card border border-theme-border p-4 md:p-6 flex flex-col backdrop-blur-sm box-glow">
                            <SniperCorners />
                            
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4 border-b border-theme-dim pb-4 shrink-0">
                                <h2 className="text-xl md:text-2xl font-bold text-theme-accent glow-text font-tajawal">{weekData.title}</h2>
                                <button 
                                    onClick={() => setIsFlipped(true)}
                                    className="flex items-center gap-2 px-4 py-2 w-full md:w-auto justify-center bg-transparent border border-theme-accent text-theme-accent hover:bg-theme-accent hover:text-theme-bg transition-all active:scale-95 font-bold"
                                >
                                    <span>المقاضي</span>
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                        <path strokeLinecap="square" strokeLinejoin="miter" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 100 4 2 2 0 000-4z"></path>
                                    </svg>
                                </button>
                            </div>

                            {/* الحاوية هذي هي اللي بتسوي السكرول (الدحرجة) */}
                            <div className="flex-1 overflow-y-auto pr-2 custom-scroll relative">
                                <table className="w-full text-right retro-table border-collapse">
                                    <thead className="sticky top-0 bg-theme-card z-10 shadow-sm shadow-black/20">
                                        <tr className="text-theme-dim text-sm uppercase font-orbitron">
                                            <th className="py-2 px-1 md:px-2 w-16 bg-theme-card">TYPE</th>
                                            <th className="py-2 px-1 md:px-2 bg-theme-card">MEAL</th>
                                            <th className="py-2 px-1 md:px-2 w-32 md:w-48 text-left bg-theme-card">MACROS</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {weekData.meals.map((meal, idx) => (
                                            <tr key={idx} className="hover:bg-theme-accent hover:bg-opacity-10 transition-colors">
                                                <td className="py-4 px-1 md:px-2 font-bold text-theme-accent align-top pt-5">{meal.type}</td>
                                                <td className="py-4 px-1 md:px-2">
                                                    <div className="font-bold text-lg mb-1">{meal.name}</div>
                                                    <div className="text-sm text-theme-dim leading-relaxed">{meal.desc}</div>
                                                </td>
                                                <td className="py-4 px-1 md:px-2 font-vt323 text-base md:text-lg tracking-wider text-left align-top pt-5">
                                                    <div className="text-theme-accent mb-1">🔥 {meal.macros.cal} KCAL</div>
                                                    <div className="text-theme-main">P:{meal.macros.p}</div>
                                                    <div className="text-theme-main">C:{meal.macros.c}</div>
                                                    <div className="text-theme-main">F:{meal.macros.f}</div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Back Side: Groceries List */}
                        <div className="absolute w-full h-full backface-hidden bg-theme-bg border border-theme-border p-4 md:p-6 flex flex-col backdrop-blur-sm box-glow rotate-y-180">
                            <SniperCorners />
                            
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4 border-b border-theme-dim pb-4 shrink-0">
                                <h2 className="text-xl md:text-2xl font-bold text-theme-text glow-text">قائمة مقاضي {weekData.title.split(':')[0]}</h2>
                                <button 
                                    onClick={() => setIsFlipped(false)}
                                    className="flex items-center gap-2 px-4 py-2 w-full md:w-auto justify-center bg-theme-accent text-theme-bg border border-theme-accent hover:bg-transparent hover:text-theme-accent transition-all active:scale-95 font-bold"
                                >
                                    <span>الجدول</span>
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                        <path strokeLinecap="square" strokeLinejoin="miter" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                                    </svg>
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto pr-2 custom-scroll">
                                <div className="space-y-3">
                                    {weekData.groceries.map((item, idx) => {
                                        const itemId = `${weekData.id}_${idx}`;
                                        const isChecked = checkedItems[itemId] || false;
                                        return (
                                            <label key={idx} className="flex items-center gap-4 cursor-pointer p-4 hover:bg-theme-card transition-colors border border-transparent hover:border-theme-dim">
                                                <input 
                                                    type="checkbox" 
                                                    checked={isChecked}
                                                    onChange={() => toggleCheck(itemId)}
                                                />
                                                <span className={`text-base md:text-lg transition-all ${isChecked ? 'line-through text-theme-dim' : 'text-theme-main'}`}>
                                                    {item}
                                                </span>
                                            </label>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const App = () => {
            const [theme, setTheme] = useState(() => localStorage.getItem('retro-theme') || 'default');
            
            const [checkedItems, setCheckedItems] = useState(() => {
                const saved = localStorage.getItem('retro-groceries');
                return saved ? JSON.parse(saved) : {};
            });

            useEffect(() => {
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('retro-theme', theme);
            }, [theme]);

            useEffect(() => {
                localStorage.setItem('retro-groceries', JSON.stringify(checkedItems));
            }, [checkedItems]);

            const toggleCheck = (id) => {
                setCheckedItems(prev => ({ ...prev, [id]: !prev[id] }));
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 pt-20">
                    <ThemeMenu currentTheme={theme} setTheme={setTheme} />
                    
                    <header className="text-center mb-12">
                        <h1 className="font-lalezar text-5xl md:text-6xl text-theme-text glow-text mb-2">جدول التغذية</h1>
                        <p className="font-orbitron text-theme-accent tracking-[0.2em] md:tracking-[0.3em] text-xs md:text-sm uppercase">PowerEra Cyber-Diet System v1.2</p>
                    </header>

                    <main>
                        {MEAL_DATA.map(week => (
                            <WeekCard 
                                key={week.id} 
                                weekData={week} 
                                checkedItems={checkedItems} 
                                toggleCheck={toggleCheck} 
                            />
                        ))}
                    </main>
                    
                    <footer className="text-center mt-12 pb-8 border-t border-theme-dim pt-4">
                        <p className="font-vt323 text-theme-dim text-xl">> SYSTEM ONLINE_</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
